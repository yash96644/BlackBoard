name: Build Blackboard — Mac + Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Build Mac app
        run: npx electron-builder --mac --publish never
        env:
          NODE_ENV: production

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Build Windows app
        run: npx electron-builder --win --publish never
        env:
          NODE_ENV: production

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
          retention-days: 30
